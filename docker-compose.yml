version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_servicos
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: servicos_db
    ports:
      - "5435:5435"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
